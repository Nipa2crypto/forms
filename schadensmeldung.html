<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interne Schadensmeldung</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="js/common.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand-group">
        <img class="logo" src="assets/logo.png" alt="Max Heidegger AG" />
        <div>
          <div class="brand-title">Interne Schadensmeldung</div>
          <div class="brand-sub">PDF-Ausgabe ohne Speicherung</div>
        </div>
      </div>
      <a class="link-btn secondary" href="index.html">Übersicht</a>
    </div>
  </header>

  <main class="wrap">
    <section class="card">
      <div class="section-head"><h2>Grunddaten</h2></div>
      <div class="grid grid-4">
        <div><label for="meldedatum">Meldedatum</label><input id="meldedatum" type="date" /></div>
        <div><label for="meldezeit">Meldezeit</label><input id="meldezeit" type="time" /></div>
        <div><label for="ort">Ort</label><input id="ort" type="text" placeholder="z. B. Werkstatt" /></div>
        <div><label for="abteilung">Abteilung</label><input id="abteilung" type="text" placeholder="z. B. Aftersales" /></div>
      </div>
      <div class="grid grid-4" style="margin-top:12px;">
        <div><label for="fahrzeug">Fahrzeug / Objekt</label><input id="fahrzeug" type="text" placeholder="z. B. BMW 320d" /></div>
        <div><label for="kennzeichen">Kennzeichen</label><input id="kennzeichen" type="text" placeholder="z. B. FL-12345" /></div>
        <div><label for="meldender">Meldende Person</label><input id="meldender" type="text" placeholder="z. B. Max Muster" /></div>
        <div><label for="kontakt">Kontakt (optional)</label><input id="kontakt" type="text" placeholder="Telefon / Mail" /></div>
      </div>
    </section>

    <section class="card">
      <div class="section-head"><h2>Schadenbeschreibung</h2></div>
      <div class="grid grid-2">
        <div><label for="beschreibung">Hergang / Beschreibung</label><textarea id="beschreibung" placeholder="Kurz und konkret"></textarea></div>
        <div>
          <label for="ursache">Vermutete Ursache</label>
          <textarea id="ursache" placeholder="Optional"></textarea>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="section-head"><h2>Kosten</h2></div>
      <div class="grid grid-4">
        <div><label for="materialkosten">Materialkosten CHF</label><input id="materialkosten" type="number" min="0" step="0.01" placeholder="0.00" /></div>
        <div><label for="lohnkosten">Lohnkosten CHF</label><input id="lohnkosten" type="number" min="0" step="0.01" placeholder="0.00" /></div>
        <div><label for="gesamt">Schadenhöhe gesamt CHF</label><input id="gesamt" type="number" readonly /></div>
        <div><label for="interneNr">Interne Nr. (optional)</label><input id="interneNr" type="text" /></div>
      </div>
      <div class="grid grid-2" style="margin-top:12px;">
        <div><label for="material">Material / Teile</label><input id="material" type="text" placeholder="Kurzliste" /></div>
        <div><label for="massnahmen">Sofortmaßnahme</label><input id="massnahmen" type="text" placeholder="z. B. Fahrzeug gesichert" /></div>
      </div>
    </section>

    <section class="card">
      <div class="section-head"><h2>Fotos / Belegbilder</h2></div>
      <div>
        <label for="fotos">Bilder auswählen (max. 3)</label>
        <input id="fotos" class="file-input" type="file" accept="image/*" multiple />
        <div id="fotoPreview" class="preview-grid"></div>
        <small class="hint">Nur Bilder (JPG/PNG/HEIC). PDFs bitte separat einreichen.</small>
      </div>
    </section>

    <section class="card">
      <div class="page-actions">
        <button type="button" id="pdfBtn">PDF erstellen</button>
        <button type="button" class="ghost" id="resetBtn">Formular leeren</button>
      </div>
      <div id="status" class="status"></div>
    </section>
  </main>

  <script>
    const H = window.HeideggerForms;
    const statusEl = H.byId('status');
    const photoInput = H.byId('fotos');
    const previewEl = H.byId('fotoPreview');
    const pdfBtn = H.byId('pdfBtn');

    const MAX_PHOTOS = 3;

    function updateTotal() {
      const total = Number(H.byId('materialkosten').value || 0) + Number(H.byId('lohnkosten').value || 0);
      H.byId('gesamt').value = H.formatMoney(total);
    }
    H.byId('materialkosten').addEventListener('input', updateTotal);
    H.byId('lohnkosten').addEventListener('input', updateTotal);

    function limitPhotos(){
      const files = photoInput.files ? [...photoInput.files].filter(f => (f.type||'').startsWith('image/')) : [];
      photoInput._mhLimitedFiles = files.slice(0, MAX_PHOTOS);
    }

    async function renderPreview(){
      previewEl.innerHTML = '';
      limitPhotos();
      const files = photoInput._mhLimitedFiles || [];
      for (const f of files){
        const arr = await H.collectImageData({ files: [f] });
        if (!arr[0]) continue;
        const img = document.createElement('img');
        img.src = arr[0].dataUrl;
        img.alt = f.name;
        previewEl.appendChild(img);
      }
    }

    photoInput.addEventListener('change', renderPreview);

    function resetForm() {
      if (!confirm('Formular wirklich leeren?')) return;
      document.querySelectorAll('input, textarea, select').forEach(el => {
        if (el.type === 'file') el.value = '';
        else el.value = '';
      });
      previewEl.innerHTML = '';
      H.byId('gesamt').value = '';
      H.showStatus(statusEl, 'Formular geleert.');
    }

    async function makePdf() {
      pdfBtn.disabled = true;
      H.showStatus(statusEl, 'PDF wird erstellt …');
      try {
        limitPhotos();
        const doc = H.getPdf();
        let y = H.pdfHeader(doc, 'Interne Schadensmeldung');
        y = H.pdfMetaTable(doc, [
          ['Meldedatum', H.byId('meldedatum').value],
          ['Meldezeit', H.byId('meldezeit').value],
          ['Ort', H.byId('ort').value],
          ['Abteilung', H.byId('abteilung').value],
          ['Fahrzeug / Objekt', H.byId('fahrzeug').value],
          ['Kennzeichen', H.byId('kennzeichen').value],
          ['Meldende Person', H.byId('meldender').value],
          ['Kontakt', H.byId('kontakt').value]
        ], y);

        y = H.pdfMetaTable(doc, [
          ['Beschreibung', H.byId('beschreibung').value],
          ['Ursache', H.byId('ursache').value]
        ], y);

        H.pdfSectionTitle(doc, 'Kosten', y);
        doc.autoTable({
          startY: y + 3,
          theme: 'grid',
          styles: { fontSize: 9, cellPadding: 2.5 },
          headStyles: { fillColor: [17,24,39] },
          head: [['Position', 'Betrag']],
          body: [
            ['Materialkosten', `${H.formatMoney(H.byId('materialkosten').value)} CHF`],
            ['Lohnkosten', `${H.formatMoney(H.byId('lohnkosten').value)} CHF`],
            ['Total', `${H.formatMoney(H.byId('gesamt').value)} CHF`]
          ]
        });

        y = doc.lastAutoTable.finalY + 8;
        y = H.pdfMetaTable(doc, [
          ['Material / Teile', H.byId('material').value],
          ['Sofortmaßnahme', H.byId('massnahmen').value],
          ['Interne Nr.', H.byId('interneNr').value]
        ], y);

        const files = photoInput._mhLimitedFiles || [];
        if (files.length) {
          const images = [];
          for (const f of files){
            const arr = await H.collectImageData({ files: [f] });
            if (arr[0]) images.push(arr[0]);
          }
          if (images.length) {
            y += 4;
            H.pdfSectionTitle(doc, 'Fotos / Belegbilder', y);
            y = await H.addImagesToPdf(doc, images, y + 4);
          }
        }

        H.savePdf(doc, 'schadensmeldung');
        H.showStatus(statusEl, 'PDF erstellt.');
      } catch (err) {
        console.error(err);
        H.showStatus(statusEl, 'PDF konnte nicht erstellt werden.');
      } finally {
        pdfBtn.disabled = false;
      }
    }

    H.byId('pdfBtn').addEventListener('click', makePdf);
    H.byId('resetBtn').addEventListener('click', resetForm);
  </script>
</body>
</html>
